<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Аналоговий годинник</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #111;
}

/* корпус */
.clock {
    width: 320px;
    height: 320px;
    border: 10px solid #fff;
    border-radius: 50%;
    position: relative;
    background: radial-gradient(circle, #222, #000);
}

/* центр */
.center {
    position: absolute;
    width: 14px;
    height: 14px;
    background: white;
    border-radius: 50%;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
}

/* стрілки */
.hand {
    position: absolute;
    left: 50%;
    top: 50%;
    transform-origin: 50% 100%;
}

.hour {
    width: 6px;
    height: 70px;
	top: 29%;
    background: #ccc;
}

.minute {
    width: 4px;
    height: 100px;
	top: 19%;
    background: #bbb;
}

.second {
    width: 2px;
    height: 120px;
	top: 13%;
    background: red;
}

/* ====== МІТКИ ГОДИН ====== */
.tick {
    position: absolute;
    width: 3px;
    height: 16px;
    background: white;
    top: 50%;
    left: 50%;
    transform-origin: bottom center;
    opacity: 0.8;
}
</style>
</head>

<body>

<div class="clock" id="clock">
    <!-- стрілки -->
    <div class="hand hour" id="hour"></div>
    <div class="hand minute" id="minute"></div>
    <div class="hand second" id="second"></div>
	<div class="center"></div>
</div>

<script>
// ===== створення 12 рисочок =====
const clock = document.getElementById("clock");

for (let i = 0; i < 12; i++) {
    const tick = document.createElement("div");
    tick.className = "tick";

    const angle = i * 30; // 360 / 12

    tick.style.transform =
        `translate(-50%, -100%) rotate(${angle}deg) translateY(-140px)`;

    clock.appendChild(tick);
}

// ===== рух стрілок =====
function updateClock() {
    const now = new Date();

    const sec = now.getSeconds();
    const min = now.getMinutes();
    const hr = now.getHours();

    const secDeg = sec * 6;
    const minDeg = min * 6 + sec * 0.1;
    const hrDeg = (hr % 12) * 30 + min * 0.5;

    document.getElementById("second").style.transform =
        `rotate(${secDeg}deg)`;

    document.getElementById("minute").style.transform =
        `rotate(${minDeg}deg)`;

    document.getElementById("hour").style.transform =
        `rotate(${hrDeg}deg)`;
}

setInterval(updateClock, 1000);
updateClock();
</script>

</body>
</html>
